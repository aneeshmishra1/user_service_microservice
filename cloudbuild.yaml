serviceAccount: projects/project-7f7e50ff-c654-4c24-867/serviceAccounts/user-service-build-sa@project-7f7e50ff-c654-4c24-867.iam.gserviceaccount.com

steps:

# Step 1: Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/user-service:$SHORT_SHA',
      '.'
    ]

# Step 2: Push image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/user-service:$SHORT_SHA'
    ]

# Step 3: Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      'run',
      'deploy', 'user-service',
      '--image', 'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/user-service:$SHORT_SHA',
      '--region', 'asia-south1',
      '--platform', 'managed',
      '--service-account','user-service-runtime-sa@project-7f7e50ff-c654-4c24-867.iam.gserviceaccount.com',
      '--allow-unauthenticated',
      '--set-env-vars','ENV=prod,DB_NAME=my-first-postgresql-db,DB_USER=Aneesh,DB_PASSWORD=Kunmun123$,INSTANCE_CONNECTION_NAME=project-7f7e50ff-c654-4c24-867:us-central1:my-first-postgresql,SECRET_KEY=add155d4e7c804ca853d3706fd3247d7ad32b45e3ceaf20956adb6df21c47b40,ALGORITHM=HS256,ACCESS_TOKEN_EXPIRE_MINUTES=30',
      # 🚀 SCALING CONFIG (ADD THESE)
      '--min-instances','1',
      '--max-instances','5',
      '--concurrency','10',

      # ⚡ CPU & MEMORY
      '--cpu','1',
      '--memory','512Mi',

      # ⏱️ Request timeout
      '--timeout','300',
    ]

images:
- 'asia-south1-docker.pkg.dev/project-7f7e50ff-c654-4c24-867/my-first-artifact-registry/user-service:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
